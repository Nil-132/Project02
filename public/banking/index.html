<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Classes - My PW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .chapter-item:hover { background-color: #f8fafc; }
    .active-chapter {
      background-color: #e0f2fe;
      border-left: 4px solid #3b82f6;
      border-radius: 12px;
      font-weight: 600;
    }
    .lecture-card { transition: all 0.3s ease; }
    .lecture-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .sidebar {
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -280px;
        top: 0;
        bottom: 0;
        z-index: 100;
        width: 280px;
        box-shadow: 4px 0 15px rgba(0,0,0,0.15);
      }
      .sidebar.open {
        transform: translateX(280px);
      }
    }
  </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <div class="sidebar w-72 bg-white border-r border-gray-200 overflow-y-auto" id="sidebar">
    <div class="p-6">
      <a href="/subjects.html" class="flex items-center gap-2 text-xl font-semibold text-gray-800 hover:text-blue-600 mb-8">
        ← Subjects
      </a>
      <div class="px-6 py-4 text-xs font-medium text-gray-500">CHAPTERS</div>
      <div class="px-3 space-y-0.5" id="chapters-list"></div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="bg-white border-b px-4 md:px-8 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="md:hidden text-3xl text-gray-700">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h1 class="text-2xl font-semibold" id="subject-title">All Classes</h1>
      </div>
      <button onclick="showManageModal()" class="flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-2xl font-medium">
        <i class="fa-solid fa-plus"></i> Manage
      </button>
    </div>

    <div class="bg-white border-b px-4 md:px-8 py-4 flex gap-4 items-center">
      <div class="relative flex-1">
        <input type="text" id="search-input" placeholder="Search lectures by title..."
               onkeyup="applyFilters()" class="w-full border border-gray-300 rounded-2xl px-5 py-3 pl-12 focus:outline-none focus:border-blue-500">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
      <select id="filter-select" onchange="applyFilters()" class="border border-gray-300 rounded-2xl px-5 py-3 focus:outline-none">
        <option value="all">All Lectures</option>
        <option value="completed">Completed</option>
        <option value="pending">Not Completed</option>
      </select>
    </div>
    <div class="flex-1 overflow-y-auto p-4 md:p-8" id="main-content"></div>
  </div>
</div>

<!-- Notes & More Choice Pop-up -->
<div id="notes-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200]">
  <div class="bg-white rounded-3xl p-8 w-full max-w-sm mx-4">
    <h3 class="text-xl font-semibold mb-6 text-center">What do you want to open?</h3>
    <div class="space-y-3">
      <button onclick="openPdf()"
              class="w-full py-4 border-2 border-blue-600 text-blue-600 hover:bg-blue-50 rounded-2xl font-medium flex items-center justify-center gap-3">
        📄 Class PDF (Notes)
      </button>
      <button onclick="openDpp()"
              class="w-full py-4 border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50 rounded-2xl font-medium flex items-center justify-center gap-3">
        📝 DPP
      </button>
    </div>
    <button onclick="hideNotesModal()" class="w-full mt-6 py-3 text-gray-500 hover:text-gray-700 font-medium">
      Cancel
    </button>
  </div>
</div>

<!-- Manage Modal (simplified for now) -->
<div id="manage-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl p-8 w-full max-w-lg mx-4">
    <h2 class="text-2xl font-semibold mb-6">Manage Content</h2>
    <p class="text-center text-gray-500 py-8">Manage functions are working.</p>
    <div class="flex gap-4">
      <button onclick="hideManageModal()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">Close</button>
    </div>
  </div>
</div>

<script>
// ============== CONFIGURATION ==============
const urlParams = new URLSearchParams(window.location.search);
const subjectId = "banking";
const subjectName = urlParams.get('subjectName') || 'Banking Awareness';
document.getElementById('subject-title').textContent = subjectName;

let currentChapterId = null;
let allLectures = [];
let currentPdfLink = '';
let currentDppLink = '';

// Toggle Sidebar
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay') || document.createElement('div');
  sidebar.classList.toggle('open');
}

// Load Data
async function loadData() {
  try {
    const chaptersRes = await fetch(`/api/chapters?subjectId=${subjectId}`);
    const chapters = await chaptersRes.json();
    let lectures = [];
    if (currentChapterId) {
      const res = await fetch(`/api/lectures?chapterId=${currentChapterId}`);
      lectures = await res.json();
    } else if (chapters.length > 0) {
      currentChapterId = chapters[0]._id;
      const res = await fetch(`/api/lectures?chapterId=${currentChapterId}`);
      lectures = await res.json();
    }
    allLectures = lectures;
    renderSidebar(chapters);
    renderLectures(lectures);
  } catch (err) {
    document.getElementById('main-content').innerHTML = `<p class="text-center text-red-500 py-20">Failed to load data</p>`;
  }
}

function renderSidebar(chapters) {
  const container = document.getElementById('chapters-list');
  container.innerHTML = '';
  chapters.forEach(ch => {
    const active = ch._id === currentChapterId ? 'active-chapter' : 'chapter-item';
    const div = document.createElement('div');
    div.className = `${active} px-4 py-3 text-sm cursor-pointer hover:bg-gray-100 rounded-xl`;
    div.textContent = ch.title;
    div.onclick = () => selectChapter(ch._id);
    container.appendChild(div);
  });
}

function renderLectures(lectures) {
  const container = document.getElementById('main-content');
  let html = '';
  if (lectures.length === 0) {
    container.innerHTML = `<p class="text-center text-gray-500 py-20">No lectures found.</p>`;
    return;
  }
  lectures.forEach(lec => {
    const imageUrl = lec.imageUrl || "https://via.placeholder.com/80x80/1f2937/ffffff?text=Instructor";
    const isCompleted = lec.completed === true;
    html += `
      <div class="lecture-card bg-white rounded-3xl p-5 flex gap-4 border border-gray-100 mb-5">
        <img src="${imageUrl}" class="w-16 h-16 rounded-2xl object-cover flex-shrink-0">
        <div class="flex-1">
          <div class="flex justify-between items-start">
            <div>
              <span class="text-xs text-gray-500">${lec.date || 'N/A'} • ${lec.duration || '45m'}</span>
              <h3 class="font-semibold text-base mt-1 line-clamp-2">${lec.title}</h3>
            </div>
            <button onclick="markLectureComplete('${lec._id}')"
                    class="w-9 h-9 flex items-center justify-center rounded-full border-2 flex-shrink-0 ${isCompleted ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 hover:border-green-500 hover:bg-green-50'}">
              ${isCompleted ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-check text-gray-400"></i>'}
            </button>
          </div>
          <div class="flex gap-3 mt-5">
            <button onclick="playVideo('${lec.youtubeId || ''}')"
                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-2xl text-sm font-medium flex items-center justify-center gap-2">
              <i class="fa-solid fa-play"></i> Watch
            </button>
            <button onclick="showNotesModal('${lec.pdfLink || ''}', '${lec.dppLink || ''}')"
                    class="flex-1 border-2 border-gray-300 hover:border-gray-400 hover:bg-gray-50 py-2.5 rounded-2xl text-sm font-medium flex items-center justify-center gap-2">
              <i class="fa-solid fa-book-open"></i> Notes & More
            </button>
          </div>
        </div>
      </div>`;
  });
  container.innerHTML = html;
}

// Notes Pop-up
function showNotesModal(pdfLink, dppLink) {
  currentPdfLink = pdfLink;
  currentDppLink = dppLink;

  if (!pdfLink && !dppLink) {
    alert("📌 Notes and DPP will be added soon!");
    return;
  }
  document.getElementById('notes-modal').classList.remove('hidden');
}

function hideNotesModal() {
  document.getElementById('notes-modal').classList.add('hidden');
}

function openPdf() {
  if (currentPdfLink) window.open(currentPdfLink, '_blank');
  hideNotesModal();
}

function openDpp() {
  if (currentDppLink) window.open(currentDppLink, '_blank');
  hideNotesModal();
}

function playVideo(videoId) {
  if (!videoId) return alert("No YouTube video ID added yet.");
  window.open(`https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`, '_blank');
}

function selectChapter(chapterId) {
  currentChapterId = chapterId;
  loadData();
}

async function markLectureComplete(lectureId) {
  alert("Login as Admin to mark complete");
}

// Initialize
window.onload = loadData;
</script>
</body>
</html>
